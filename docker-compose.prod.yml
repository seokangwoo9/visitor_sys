# Production stack: application + PostgreSQL.
#
# The app serves plain HTTP on port 3000. It is designed to sit BEHIND a
# reverse proxy that terminates HTTPS. Two supported topologies:
#
#   Option A (recommended for host + VM): an external reverse proxy on the
#   host terminates HTTPS and forwards HTTP to this VM. Run the base file only:
#     docker compose -f docker-compose.prod.yml --env-file deploy/prod.env up -d --build
#   Bind the app to the VM's private interface with APP_BIND (see prod.env).
#
#   Option B (standalone VM with its own HTTPS): add the Caddy overlay so the
#   VM obtains its own Let's Encrypt certificate:
#     docker compose -f docker-compose.prod.yml -f docker-compose.prod.https.yml \
#       --env-file deploy/prod.env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: tvms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visitor_system}
      POSTGRES_USER: ${POSTGRES_USER:-visitor_system}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - tvms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-visitor_system} -d ${POSTGRES_DB:-visitor_system}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tvms

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tvms-app:latest
    container_name: tvms_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-visitor_system}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-visitor_system}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-System Administrator}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@example.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
    # Published for the reverse proxy to reach. APP_BIND controls which VM
    # interface the port is exposed on:
    #   - Option A: set APP_BIND to the VM's private IP (e.g. 192.168.10.20)
    #     so only the host reverse proxy can reach it.
    #   - Default 0.0.0.0 exposes it on all interfaces (fine for local testing
    #     or when the Caddy overlay fronts it).
    # The HTTPS overlay overrides this to bind localhost-only behind Caddy.
    ports:
      - "${APP_BIND:-0.0.0.0}:${APP_PORT:-3000}:3000"
    networks:
      - tvms

volumes:
  tvms_postgres_data:

networks:
  tvms:
    driver: bridge
